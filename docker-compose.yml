services:
  backend:
    build: ./backend
    env_file:
      - .env
    environment:
      GRIDAM_DB_PATH: /app/data/gridam.db
    volumes:
      - gridam-data:/app/data
    expose:
      - "8000"

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  gridam-data:
