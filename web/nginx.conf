server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API → backend container. Trailing slash on proxy_pass strips the /api prefix
    # so /api/config reaches the backend as /config.
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static assets (hashed) — long cache.
    location ~* \.(css|js|png|jpe?g|svg|woff2?)$ {
        expires 7d;
        access_log off;
        try_files $uri =404;
    }

    # SPA fallback: every other path serves index.html so client-side routes
    # (/app, /app/charge, /app/profile, …) work on refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
